<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>VimTabs Preview</title>
		<style>
			:root {
				color-scheme: dark;
				--accent: #d7827e;
				--preview-bg: #232136;
				--preview-text: #f6f0ea;
				--preview-label-size: 3rem;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font:
					14px "Inter",
					system-ui,
					sans-serif;
				background:
					radial-gradient(
						circle at top left,
						color-mix(in srgb, var(--accent) 46%, transparent),
						transparent 34%
					),
					radial-gradient(
						circle at bottom right,
						color-mix(in srgb, var(--accent) 28%, transparent),
						transparent 42%
					),
					linear-gradient(
						135deg,
						color-mix(in srgb, var(--accent) 14%, var(--preview-bg)),
						var(--preview-bg)
					);
				color: var(--preview-text);
				overflow: hidden;
			}

			.preview {
				position: fixed;
				inset: 0;
				border: 3px solid var(--accent);
				display: flex;
				align-items: flex-start;
				justify-content: flex-start;
				padding: 14px;
				background:
					linear-gradient(
						180deg,
						rgba(255, 255, 255, 0.05),
						rgba(255, 255, 255, 0.01) 26%,
						rgba(0, 0, 0, 0.06)
					),
					radial-gradient(
						circle at top left,
						color-mix(in srgb, var(--accent) 42%, transparent),
						transparent 36%
					),
					linear-gradient(
						135deg,
						color-mix(in srgb, var(--accent) 16%, transparent),
						rgba(0, 0, 0, 0.03)
					);
				backdrop-filter: blur(4px) saturate(1.05);
				box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
			}

			.badge {
				padding: 14px 22px;
				font-size: var(--preview-label-size);
				font-weight: 600;
				line-height: 0.95;
				letter-spacing: -0.04em;
				text-transform: uppercase;
				background: var(--accent);
				color: #f6f0ea;
			}
		</style>
	</head>
	<body>
		<div class="preview">
			<div class="badge" id="label"></div>
		</div>
		<script src="preview.js"></script>
	</body>
</html>
