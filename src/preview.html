<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>VimTabs Preview</title>
		<style>
			:root {
				color-scheme: dark;
				--accent: #d7827e;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font:
					14px "Inter",
					system-ui,
					sans-serif;
				background:
					radial-gradient(
						circle at top,
						color-mix(in srgb, var(--accent) 24%, transparent),
						transparent 38%
					),
					rgba(27, 25, 27, 0.98);
				color: #f6f0ea;
			}

			.preview {
				position: fixed;
				inset: 0;
				border: 3px solid var(--accent);
				display: flex;
				align-items: flex-start;
				justify-content: flex-start;
				padding: 14px;
			}

			.badge {
				padding: 6px 10px;
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				background: var(--accent);
				color: #111111;
			}
		</style>
	</head>
	<body>
		<div class="preview">
			<div class="badge" id="label"></div>
		</div>
		<script src="preview.js"></script>
	</body>
</html>
